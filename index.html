<!DOCTYPE html>
<html>
<head>
<title>GitHub Profile Viewer</title>

<style>

body{
  font-family: Arial;
  text-align: center;
  margin-top: 50px;
}

input{
  padding: 8px;
  width: 200px;
}

button{
  padding: 8px 15px;
  cursor: pointer;
}

.card{
  margin-top: 30px;
}

img{
  border-radius: 50%;
}

</style>
</head>

<body>

<h2>GitHub Profile Viewer</h2>

<input id="username" placeholder="Enter GitHub username">
<button onclick="searchProfile()">Search</button>

<div class="card">

<img id="avatar" width="120"><br><br>

<h3 id="name"></h3>

<p id="login"></p>

<p id="followers"></p>

<p id="repos"></p>

</div>

<script>

async function searchProfile(){

  var username = document.getElementById("username").value;

  try{

    var response = await fetch("https://api.github.com/users/" + username);

    if(!response.ok){
      throw new Error("User not found");
    }

    var data = await response.json();

    document.getElementById("avatar").src = data.avatar_url;

    document.getElementById("name").innerText = data.name;

    document.getElementById("login").innerText = "Username: " + data.login;

    document.getElementById("followers").innerText = "Followers: " + data.followers;

    document.getElementById("repos").innerText = "Public Repos: " + data.public_repos;

  }

  catch(error){

    document.getElementById("name").innerText = "User not found";

    document.getElementById("login").innerText = "";

    document.getElementById("followers").innerText = "";

    document.getElementById("repos").innerText = "";

    document.getElementById("avatar").src = "";

  }

}

</script>

</body>
</html>
